<div class="shopping-app">
      <h1>Custom Checkbox Example</h1>

      <div class="demo-section">
        <!-- Two-way binding with custom components -->
        <app-custom-checkbox [(checked)]="agreedToTerms" label="I agree to the terms" />
        <app-custom-checkbox [(checked)]="enableNotifications" label="Enable notifications" />

        <!-- Controls to test two-way binding -->
        <div class="controls">
          <p>
            Terms agreed:
            @if (agreedToTerms()) {
              Yes
            } @else {
              No
            }
          </p>
          <p>
            Notifications:
            @if (enableNotifications()) {
              Enabled
            } @else {
              Disabled
            }
          </p>
          <button (click)="toggleTermsFromParent()">Toggle Terms from Parent</button>
          <button (click)="resetAll()">Reset All</button>
        </div>
      </div>
    </div>
